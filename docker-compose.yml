services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: flowershop-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
      - ./backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # RabbitMQ with STOMP plugin
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flowershop-rabbitmq-prod
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
      - "61613:61613" # STOMP
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    command: bash -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_web_stomp rabbitmq_management; rabbitmq-server"
    networks:
      - flowershop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend - Production
  backend:
    build:
      context: ./flower-shop
      dockerfile: Dockerfile
      target: production
    container_name: flowershop-backend-prod
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT: ${JWT}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      STORAGE_LOCAL_PATH: /app/images
      STORAGE_BASE_URL: http://localhost/images
      SPRING_RABBITMQ_HOST: rabbitmq
    volumes:
      - images_data:/app/images
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - production

  # Spring Boot Backend - Development
  backend-dev:
    build:
      context: ./flower-shop
      dockerfile: Dockerfile
      target: development
    container_name: flowershop-backend-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT: ${JWT}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      STORAGE_LOCAL_PATH: /app/images
      STORAGE_BASE_URL: http://localhost:8081/images
      SPRING_RABBITMQ_HOST: rabbitmq
    volumes:
      # Bind mount source code for hot-reload
      - ./flower-shop/src:/app/src:rw
      - ./flower-shop/pom.xml:/app/pom.xml:rw
      - maven_cache:/root/.m2
      # Persist uploaded images
      - images_data:/app/images
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    profiles:
      - development

  # Vue.js Frontend - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: flowershop-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      VUE_APP_API_BASE: ${VUE_APP_API_BASE}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # For SSL certificates (if using Let's Encrypt)
      - ./ssl:/etc/nginx/ssl:ro
    profiles:
      - production

  # Vue.js Frontend - Development
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: flowershop-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VUE_APP_API_BASE: ${VUE_APP_API_BASE:-http://localhost:8081/api}
    volumes:
      # Bind mount source code for hot-reload
      - ./frontend/src:/app/src:rw
      - ./frontend/public:/app/public:rw
      - ./frontend/package.json:/app/package.json:rw
      # Mount env files so Vue CLI picks up VUE_APP_* at compile time
      - ./frontend/.env:/app/.env:ro
      - ./frontend/.env.development:/app/.env.development:ro
      # Mount node_modules to prevent conflicts
      - /app/node_modules
    depends_on:
      - backend-dev
    networks:
      - frontend-network
    profiles:
      - development

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  images_data:
    driver: local
  maven_cache:
    driver: local
